services:
  - type: web
    name: interior-ecommerce
    runtime: python310
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -b 0.0.0.0:10000 application:app"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: ADMIN_COOKIE_SECURE
        value: "true"
