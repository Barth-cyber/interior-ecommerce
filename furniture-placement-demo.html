<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furniture Placement Scene — Interior Duct</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f5f5;
      overflow: hidden;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #f5f0e8 0%, #e8dcc8 100%);
    }

    #controls-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    .header {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      color: white;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
    }

    .header p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    /* Scrollbar styling */
    #controls-panel::-webkit-scrollbar {
      width: 6px;
    }

    #controls-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #controls-panel::-webkit-scrollbar-thumb {
      background: #C4A882;
      border-radius: 3px;
    }

    #controls-panel::-webkit-scrollbar-thumb:hover {
      background: #7B5C3E;
    }

    /* Loading indicator */
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      z-index: 200;
      text-align: center;
      display: none;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 1rem;
      border: 4px solid #f0f0f0;
      border-top: 4px solid #1B3A6B;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      #controls-panel {
        right: 10px;
        top: 10px;
      }

      .header {
        left: 10px;
        top: 10px;
      }

      .header h1 {
        font-size: 1.3rem;
      }

      .header p {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="header">
  <h1>Furniture Placement</h1>
  <p>Drag, drop & arrange</p>
</div>

<div id="controls-panel"></div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Initializing scene...</p>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- THREE.js Addons -->
<script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/DRACOLoader.js"></script>

<!-- Furniture Placement Scene -->
<script src="/static/furniture-placement-scene.js"></script>
<script src="/static/furniture-placement-ui.js"></script>

<script>
  // Initialize the furniture placement scene
  document.addEventListener('DOMContentLoaded', async () => {
    const loading = document.getElementById('loading');
    loading.classList.add('active');

    try {
      // Create the scene
      const scene = new FurniturePlacementScene('#canvas-container', {
        gridSize: 0.5,
        snapEnabled: true,
        cameraDistance: 15,
        lightingPreset: 'studio',
        backgroundColor: 0xf5f0e8
      });

      // Create UI controls
      const ui = new FurniturePlacementUI(scene, '#controls-panel');

      // Hide loading indicator
      loading.classList.remove('active');

      // Log scene ready
      console.log('✓ Furniture Placement Scene initialized');
      console.log('✓ Supported features:');
      console.log('  - Drag and drop furniture');
      console.log('  - Snap to grid (customizable)');
      console.log('  - 3 lighting presets (studio, light, dark)');
      console.log('  - GLB/GLTF loading with Draco compression');
      console.log('  - Keyboard controls (WASD, Q/E, Delete)');
      console.log('  - Export/import layout as JSON');

      // Make globally available for debugging
      window.furnitureScene = scene;
      window.furnitureUI = ui;

    } catch (error) {
      console.error('Failed to initialize scene:', error);
      loading.innerHTML = `<p style="color: #d9534f;">Error: ${error.message}</p>`;
    }
  });
</script>

</body>
</html>
